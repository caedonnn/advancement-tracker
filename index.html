<!DOCTYPE html>
<html>
<head>
    <title>Blaze & Cave Advancement Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            background: #111;
            color: white;
        }

        .card {
            background: #222;
            padding: 20px;
            margin-top: 15px;
            border-radius: 12px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        .leaderboard-entry {
            margin: 6px 0;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4CAF50;
        }

        ul {
            padding-left: 25px;
        }
    </style>
</head>
<body>

<h1>🏆 Blaze & Cave Advancement Tracker</h1>

<div class="card">
    <h2>Leaderboard</h2>
    <div id="leaderboard">Loading...</div>
</div>

<br>

<input id="playerName" placeholder="Enter player name">
<button onclick="searchPlayer()">Search</button>

<div id="result"></div>

<script>

let allPlayers = [];

async function loadData() {
    const response = await fetch("data/players.json");
    const data = await response.json();

    allPlayers = data.players;

    allPlayers.sort((a,b) =>
        b.advancements - a.advancements
    );

    document.getElementById("leaderboard").innerHTML =
        allPlayers.map((p,i) =>
            `<div class="leaderboard-entry">
                #${i+1} ${p.name} (${p.advancements})
            </div>`
        ).join("");
}

async function searchPlayer() {

    const name = document.getElementById("playerName").value;

    console.log(allPlayers);

    const player = allPlayers.find(
        p => p.name.toLowerCase() === name.toLowerCase()
    );

    if (!player) {
        document.getElementById("result").innerHTML =
            "<div class='card'>Player not found.</div>";
        return;
    }

    const percent =
        player.advancements
          ((player.advancements / 1062) * 100).toFixed(1);

    const categories =
        Object.entries(player.categories)
        .map(([name,value]) =>
            `<li>${name}: ${value}</li>`
        ).join("");

    const recent =
        player.recent
        .map(a => `<li>✅ ${a}</li>`)
        .join("");

    const locked =
        player.locked
        .map(a => `<li>🔒 ${a}</li>`)
        .join("");

    document.getElementById("result").innerHTML = `
        <div class="card">

            <h2>${player.name}</h2>

            <p>
                <b>Progress:</b>
                ${player.advancements}/1062
                (${percent}%)
            </p>

            <div class="progress-bar">
                <div class="progress-fill"
                     style="width:${percent}%">
                </div>
            </div>

            <h3>📊 Categories</h3>
            <ul>${categories}</ul>

            <h3>🕒 Recent Advancements</h3>
            <ul>${recent}</ul>

            <h3>🔒 Locked Advancements</h3>
            <ul>${locked}</ul>

        </div>
    `;
}

loadData();

</script>

</body>
</html>
